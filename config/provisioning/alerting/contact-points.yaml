# Grafana 알림 연결처(contact point) — as-code provisioning
# 웹훅 URL은 .env(gitignore)의 DISCORD_ALERT_WEBHOOK_URL 참조 (public 레포이므로 커밋 금지).
# 메시지 디자인(스타일 B): Grafana Discord는 title→임베드박스(아래), message→텍스트(위) 구조라
# 목업처럼 한 덩어리로 보이게 title은 비우고 message에 전부(제목줄+구분선+요약+링크) 몰았다.
apiVersion: 1

contactPoints:
  - orgId: 1
    name: discord            # 알림 정책(notification policy)이 이 이름으로 라우팅
    receivers:
      - uid: discord-webhook
        type: discord
        settings:
          url: ${DISCORD_ALERT_WEBHOOK_URL}
          title: ' '
          message: |
            {{ if eq .Status "resolved" }}✅{{ else if eq .CommonLabels.severity "critical" }}🚨{{ else }}⚠️{{ end }} **[{{ if .CommonLabels.dag_id }}{{ if eq .CommonLabels.dag_id "oliveyoung_crawling" }}올리브영 크롤링{{ else if eq .CommonLabels.dag_id "oliveyoung_pipeline" }}올리브영 파이프라인{{ else if eq .CommonLabels.dag_id "inci_monthly_pipeline" }}INCI 파이프라인{{ else }}{{ .CommonLabels.dag_id }}{{ end }}{{ else }}올리브영 {{ .CommonLabels.pipeline }}{{ end }}] {{ .CommonLabels.alertname }}**{{ if eq .Status "resolved" }} 해소{{ end }}
            ━━━━━━━━━━━━━━━━━━━━
            {{ .CommonAnnotations.summary }}
            {{ if .CommonLabels.dag_id }}💥 실패 DAG   {{ .CommonLabels.dag_id }}
            {{ end }}{{ if eq .CommonLabels.pipeline "파이프라인" }}🔗 [로그 보기](http://43.200.169.27:3000/explore?schemaVersion=1&panes=%7B%22log%22%3A%7B%22datasource%22%3A%22cfp3bjqtnftvkf%22%2C%22queries%22%3A%5B%7B%22refId%22%3A%22A%22%2C%22expr%22%3A%22%7Bjob%3D%5C%22airflow%5C%22%7D%22%2C%22datasource%22%3A%7B%22type%22%3A%22loki%22%2C%22uid%22%3A%22cfp3bjqtnftvkf%22%7D%7D%5D%2C%22range%22%3A%7B%22from%22%3A%22now-1h%22%2C%22to%22%3A%22now%22%7D%7D%7D&orgId=1)  ·  [대시보드](http://43.200.169.27:3000/d/airflow-monitoring){{ else }}🔗 [대시보드](http://43.200.169.27:3000/d/oliveyoung-dq-table){{ end }}
        # 해소(✅) 알림 끔 — 우리 알림은 시간창/임계 기반이라 "해소"가 진짜 복구가 아님
        # (예: DAG실패는 10분 창 벗어나면 자동 해소, DAG는 여전히 고장). 오해 방지로 firing만 보냄.
        disableResolveMessage: true

  # ── 시스템 메트릭용 연결처 (해소 알림 켬) ──────────────────────────────────
  # board=system 알림이 이리로 라우팅(notification-policy). 같은 웹훅=같은 채널이지만
  # 시스템은 임계 넘음→내려감이 진짜 복구라 해소(✅)를 보낸다. 제목은 인프라용([host·component]).
  - orgId: 1
    name: discord-system
    receivers:
      - uid: discord-system-webhook
        type: discord
        settings:
          url: ${DISCORD_ALERT_WEBHOOK_URL}
          title: ' '
          message: |
            {{ if eq .Status "resolved" }}✅{{ else if eq .CommonLabels.severity "critical" }}🚨{{ else }}⚠️{{ end }} **[{{ .CommonLabels.host }} · {{ .CommonLabels.component }}] {{ .CommonLabels.alertname }}**{{ if eq .Status "resolved" }} 정상화{{ end }}
            ━━━━━━━━━━━━━━━━━━━━
            {{ .CommonAnnotations.summary }}
            🔗 [대시보드](http://43.200.169.27:3000/d/airflow-monitoring)
        disableResolveMessage: false
