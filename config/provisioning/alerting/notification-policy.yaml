# 알림 라우팅 정책 — 모든 알림을 discord 연결처로 보낸다.
# (루트 정책을 provisioning하면 Grafana 기본 정책을 이 내용으로 대체함)
apiVersion: 1

policies:
  - orgId: 1
    receiver: discord          # contact-points.yaml 의 name 과 일치
    group_by:
      - grafana_folder
      - alertname
      - dag_id                 # DAG별로 그룹 분리 → 제목이 실패한 DAG를 반영(INCI/올리브영), 요약 중복 방지
    group_wait: 30s            # 최초 알림 전 같은 그룹 버퍼링 (짧게)
    group_interval: 5m         # 그룹에 새 알림 추가 시 재전송 간격
    repeat_interval: 4h        # 계속 firing이면 재알림 주기 (스팸 방지로 넉넉히)
    routes:
      # 시스템 메트릭 알림(board=system)은 해소(✅) 켠 discord-system으로 라우팅.
      # 매칭되면 여기서 멈춤(기본 continue=false) → 파이프라인 연결처로 중복 안 감.
      - receiver: discord-system
        object_matchers:
          - ['board', '=', 'system']
        group_by: [alertname, host]   # 호스트별로 분리 → 어느 서버인지 구분
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
