# Grafana 알림 룰 8종 — as-code provisioning
#
# 데이터소스 UID·임계치는 라이브 서버(2026-07-16)에서 확보해 반영:
#   Prometheus       = cfltz3i4tlfr4e
#   Infinity(DQ API) = efqsx4w1y7caof
#   match_rate 평상시 ≈ 0.991 (silver_to_gold, 0~1) → 하한 0.95
#   crawl 정상치: products_total 2300~3600 / categories_zero 0 / bronze error_rate ~0.41(dedup)
#
# pipeline 라벨(크롤링/전처리/파이프라인)로 Discord 메시지 제목을 라우팅한다.
# ⚠️ Infinity 알림 룰은 반드시 parser: backend. 첫 로딩 후 UI에서 1회 검증 권장.
#
# [오탐 방지 정책] 서버 재기동/스크랩 공백에 "데이터 없음/조회 실패"가 알림으로 새지 않게:
#   noDataState: OK   — 데이터 없음 = 실패 없음/미실행 = 정상 (실제 위반은 값이 잡혀서 발화)
#   execErrState: OK  — 조회 실패(dq_api 콜드스타트 등)는 알림 대상 아님 (dq_api는 캐시+헬스체크로 자가복구)
#   예외: 스케줄러 다운만 noDataState: Alerting (하트비트 시리즈 소멸=다운이 곧 탐지 신호)
apiVersion: 1

groups:
  # ── Prometheus 소스: 오케스트레이션 알림 (1분 간격) ──────────────────────
  - orgId: 1
    name: airflow-orchestration
    folder: 4evr0-alerts
    interval: 1m
    rules:
      # #2 DAG 실패 — 최근 10분 내 실패한 DAG run 발생
      - uid: alert-dag-failed
        title: DAG 실패
        condition: C
        for: 2m           # 재기동 직후 카운터 리셋/스크랩 아티팩트를 걸러내도록 잠깐 지속 요구
        noDataState: OK
        execErrState: OK
        labels:
          severity: critical
          pipeline: 파이프라인
        annotations:
          summary: "DAG 실패 감지 — 최근 10분 내 실패한 DAG run이 있습니다."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: cfltz3i4tlfr4e
            model:
              refId: A
              editorMode: code
              expr: increase(airflow_dagrun_duration_failed_count[10m])
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              reducer: last
              expression: A
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }

      # #3 스케줄러 다운 — 최근 5분간 heartbeat 증가 없음 (거의 공짜인데 제일 실전적)
      - uid: alert-scheduler-down
        title: Airflow 스케줄러 다운
        condition: C
        for: 5m           # 스크랩 일시 누락에 안 떨리도록 지속 조건
        noDataState: Alerting   # heartbeat 시리즈 자체가 사라져도 = 다운
        execErrState: OK
        labels:
          severity: critical
          pipeline: 파이프라인
        annotations:
          summary: "Airflow 스케줄러 heartbeat가 5분 이상 없습니다 — 스케줄러 다운 의심."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: cfltz3i4tlfr4e
            model:
              refId: A
              editorMode: code
              expr: increase(airflow_scheduler_heartbeat[5m])
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              reducer: last
              expression: A
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }   # 5분간 heartbeat < 1건 = 다운

  # ── Infinity(dq_api) 소스: 데이터 신선도·품질 알림 (10분 간격) ────────────
  # dq_api는 요청마다 Iceberg 풀스캔 → 자주 때리지 않도록 간격을 넉넉히.
  - orgId: 1
    name: pipeline-data-quality
    folder: 4evr0-alerts
    interval: 10m
    rules:
      # #1a crawl 신선도 — 크롤이 96h(≈4일) 넘게 안 돎 (크롤 주기 3일 + 버퍼)
      - uid: alert-crawl-freshness
        title: crawl 신선도
        condition: C
        for: 0m           # age>96h는 이미 오래 지속된 상태
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
          pipeline: 크롤링
        annotations:
          summary: 'crawl 파이프라인이 96시간 넘게 실행되지 않았습니다 (age {{ printf "%.1f" $values.B.Value }}h).'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: efqsx4w1y7caof
            model:
              refId: A
              datasource: { type: yesoreyeram-infinity-datasource, uid: efqsx4w1y7caof }
              type: json
              source: url
              parser: backend
              format: table
              url: http://dq_api:8000/dq/freshness?stage=crawl
              url_options: { method: GET }
              root_selector: ""
              columns:
                - { selector: age_hours, text: age_hours, type: number }
          - refId: B
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [96] }

      # #1b 전처리 지연 — 새 crawl 뒤 전처리(silver_to_gold)가 1h 넘게 못 따라옴
      - uid: alert-preprocess-lag
        title: 전처리 지연
        condition: C
        for: 0m
        noDataState: OK    # silver 역대 미실행이면 lag=NULL → 미알림 (#2가 커버)
        execErrState: OK
        labels:
          severity: warning
          pipeline: 전처리
        annotations:
          summary: '새 crawl 데이터 대비 전처리가 1시간 넘게 지연됨 (lag {{ printf "%.1f" $values.B.Value }}h).'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: efqsx4w1y7caof
            model:
              refId: A
              datasource: { type: yesoreyeram-infinity-datasource, uid: efqsx4w1y7caof }
              type: json
              source: url
              parser: backend
              format: table
              url: http://dq_api:8000/dq/pipeline-lag
              url_options: { method: GET }
              root_selector: ""
              columns:
                - { selector: lag_hours, text: lag_hours, type: number }
          - refId: B
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [1] }

      # #4 데이터 품질 급락 — silver_to_gold match_rate(성분 매칭율)가 임계치 미만
      - uid: alert-match-rate-drop
        title: 데이터 품질 급락(match_rate)
        condition: C
        for: 0m           # 10분 간격 평가라 1회 급락도 유의미
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
          pipeline: 전처리
        annotations:
          summary: 'silver_to_gold match_rate가 임계치 미만입니다 (값 {{ printf "%.3f" $values.B.Value }}).'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: efqsx4w1y7caof
            model:
              refId: A
              datasource: { type: yesoreyeram-infinity-datasource, uid: efqsx4w1y7caof }
              type: json
              source: url
              parser: backend
              format: table
              url: http://dq_api:8000/dq/latest?stage=silver_to_gold&metric=match_rate
              url_options: { method: GET }
              root_selector: ""
              columns:
                - { selector: metric_value, text: metric_value, type: number }
          - refId: B
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [0.95] }

      # #5 빈 카테고리 — 크롤됐지만 상품 0개인 카테고리 발생 (에러 없는 조용한 데이터 손실)
      - uid: alert-crawl-categories-zero
        title: 빈 카테고리
        condition: C
        for: 0m
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
          pipeline: 크롤링
        annotations:
          summary: '크롤됐지만 상품 0개인 카테고리가 있습니다 ({{ printf "%.0f" $values.B.Value }}개).'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: efqsx4w1y7caof
            model:
              refId: A
              datasource: { type: yesoreyeram-infinity-datasource, uid: efqsx4w1y7caof }
              type: json
              source: url
              parser: backend
              format: table
              url: http://dq_api:8000/dq/latest?stage=crawl&metric=categories_zero
              url_options: { method: GET }
              root_selector: ""
              columns:
                - { selector: metric_value, text: metric_value, type: number }
          - refId: B
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }

      # #6 수집량 급감 — crawl 수집 상품이 비정상적으로 적음 (크롤 대량실패, 07-05에 751로 폭락)
      - uid: alert-crawl-products-low
        title: 수집량 급감
        condition: C
        for: 0m
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
          pipeline: 크롤링
        annotations:
          summary: 'crawl 수집 상품이 비정상적으로 적습니다 ({{ printf "%.0f" $values.B.Value }}건, 임계 1500).'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: efqsx4w1y7caof
            model:
              refId: A
              datasource: { type: yesoreyeram-infinity-datasource, uid: efqsx4w1y7caof }
              type: json
              source: url
              parser: backend
              format: table
              url: http://dq_api:8000/dq/latest?stage=crawl&metric=products_total
              url_options: { method: GET }
              root_selector: ""
              columns:
                - { selector: metric_value, text: metric_value, type: number }
          - refId: B
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1500] }

      # #7 전처리 오류율 상승 — bronze→silver error_rate가 dedup 정상선(~0.41) 크게 초과
      - uid: alert-silver-error-rate
        title: 전처리 오류율 상승
        condition: C
        for: 0m
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
          pipeline: 전처리
        annotations:
          summary: 'bronze→silver 오류율이 임계치를 초과했습니다 (값 {{ printf "%.3f" $values.B.Value }}, 임계 0.7).'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: efqsx4w1y7caof
            model:
              refId: A
              datasource: { type: yesoreyeram-infinity-datasource, uid: efqsx4w1y7caof }
              type: json
              source: url
              parser: backend
              format: table
              url: http://dq_api:8000/dq/latest?stage=bronze_to_silver&metric=error_rate
              url_options: { method: GET }
              root_selector: ""
              columns:
                - { selector: metric_value, text: metric_value, type: number }
          - refId: B
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.7] }

  # ── node-exporter 소스: 시스템 리소스 알림 (1분 간격, 해소 O) ─────────────
  # airflow 호스트(EC2/홈서버)의 디스크·메모리·노드 생존. Alloy가 remote_write하는
  # node_* / up 메트릭 사용(host 라벨로 서버 구분 → 알림에 어느 서버인지 표시).
  # board=system 라벨로 discord-system 연결처(해소 O)로 라우팅된다.
  - orgId: 1
    name: system-resource
    folder: 4evr0-alerts
    interval: 1m
    rules:
      # S1 디스크 부족 경고 — root 사용률 85% 초과 (다운 유발 전 여유 있게)
      - uid: alert-disk-high
        title: 디스크 부족
        condition: C
        for: 10m
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
          board: system
          component: 디스크
        annotations:
          summary: '{{ $labels.host }} 루트 디스크 사용률 {{ printf "%.1f" $values.B.Value }}% (임계 85%)'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: cfltz3i4tlfr4e
            model:
              refId: A
              editorMode: code
              expr: '100 - (node_filesystem_avail_bytes{job="airflow-node",mountpoint="/"} / node_filesystem_size_bytes{job="airflow-node",mountpoint="/"} * 100)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [85] }

      # S2 디스크 위험 — root 사용률 93% 초과 (다운 직전 마지막 경고)
      - uid: alert-disk-critical
        title: 디스크 위험
        condition: C
        for: 5m
        noDataState: OK
        execErrState: OK
        labels:
          severity: critical
          board: system
          component: 디스크
        annotations:
          summary: '{{ $labels.host }} 루트 디스크 사용률 {{ printf "%.1f" $values.B.Value }}% — 위험 (임계 93%)'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: cfltz3i4tlfr4e
            model:
              refId: A
              editorMode: code
              expr: '100 - (node_filesystem_avail_bytes{job="airflow-node",mountpoint="/"} / node_filesystem_size_bytes{job="airflow-node",mountpoint="/"} * 100)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [93] }

      # S3 메모리 부족 — 사용률 90% 초과 (OOM 위험)
      - uid: alert-mem-high
        title: 메모리 부족
        condition: C
        for: 10m
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
          board: system
          component: 메모리
        annotations:
          summary: '{{ $labels.host }} 메모리 사용률 {{ printf "%.1f" $values.B.Value }}% (임계 90%)'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: cfltz3i4tlfr4e
            model:
              refId: A
              editorMode: code
              expr: '(1 - node_memory_MemAvailable_bytes{job="airflow-node"} / node_memory_MemTotal_bytes{job="airflow-node"}) * 100'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [90] }

      # S4 노드 메트릭 끊김 — 15분 전엔 있던 호스트가 지금 없음 (호스트별, 방법 C)
      # up{job="airflow-node"}는 Alloy 스크레이프가 생성 → host 라벨과 함께 remote_write됨.
      - uid: alert-node-absent
        title: 노드 메트릭 끊김
        condition: C
        for: 0m
        noDataState: OK        # 사라진 호스트 없음 = unless 결과 없음 = 정상
        execErrState: OK
        labels:
          severity: warning
          board: system
          component: 노드
        annotations:
          summary: '{{ $labels.host }} 노드 메트릭이 끊겼습니다 — 15분 전 대비 미수신(호스트 다운 의심).'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: cfltz3i4tlfr4e
            model:
              refId: A
              editorMode: code
              expr: 'count by(host) (up{job="airflow-node"} offset 15m) unless count by(host) (up{job="airflow-node"})'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model: { refId: B, type: reduce, reducer: last, expression: A }
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0] }
