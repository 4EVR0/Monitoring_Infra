auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
  storage:
    s3:
      bucketnames: 4evr0-monitoring
      region: ap-northeast-2
      s3forcepathstyle: false
      # 정적 키 없음 → EC2 IAM 롤(S3 FullAccess)로 인증

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  aws:
    bucketnames: 4evr0-monitoring
    region: ap-northeast-2

compactor:
  working_directory: /loki/compactor
  retention_enabled: false        # 장기보관: 삭제 안 함. 추후 retention 걸 때 true + delete_request_store 설정
  delete_request_store: s3

limits_config:
  reject_old_samples: false       # 마이그레이션/과거 로그 수용
  max_query_lookback: 0s          # 무제한 조회
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  max_label_names_per_series: 30
  allow_structured_metadata: true

# 단일 바이너리(monolithic) 모드 — 소규모 셀프호스트에 적합
