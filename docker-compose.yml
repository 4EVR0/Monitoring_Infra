version: '3'

# 공용 모니터링 스택 (이전 위치: /home/ubuntu/monitoring)
# 소유 그룹: adv  /  데이터는 named volume 으로 영속화됨
services:
  prometheus:
    image: prom/prometheus:v3.11.3          # 태그 고정: latest 자동 업그레이드 방지
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus          # TSDB 영속화
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'  # Alloy remote_write 수신
    restart: always

  grafana:
    image: grafana/grafana:13.0.1            # 현재 동작 중인 버전으로 고정
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=kniepdennis-neo4j-datasource,yesoreyeram-infinity-datasource
    volumes:
      - grafana-data:/var/lib/grafana        # 대시보드/데이터소스/계정 영속화 (이전엔 휘발성이었음)
    restart: always

  loki:
    image: grafana/loki:3.5.0                 # 멀티아치(arm64 자동), 단일바이너리 모드
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/config.yml
      - loki-data:/loki                        # 인덱스/wal/캐시 (청크는 S3로)
    command: -config.file=/etc/loki/config.yml # 인증은 EC2 IAM 롤(MonitoringServerRole)→S3
    restart: always

  dq_api:
    build: ./dq_api                            # 정합성(DQ) 메트릭 조회 API (Iceberg→DuckDB→JSON)
    ports:
      - "8000:8000"                            # Grafana는 compose 망 DNS(http://dq_api:8000)로 접근
    environment:
      # warehouse 경로·리전은 비밀 아님 → compose에 직접. 자격증명은 EC2 IAM 롤(IMDS hop limit=2 필요)
      - ICEBERG_WAREHOUSE_PATH=s3://oliveyoung-crawl-data/olive_young_iceberg_metadata/
      - AWS_REGION=ap-northeast-2
    restart: always
    labels:
      - autoheal=true                          # autoheal이 unhealthy 감지 시 이 컨테이너 재시작
    healthcheck:
      # /health가 아닌 S3를 실제로 타는 엔드포인트로 검사해야 TLS 상태 부패를 잡음.
      # 장기 구동 시 pyarrow/aws-sdk TLS 컨텍스트가 깨져 S3 접근이 curlCode77로 실패 → 재시작만이 해결.
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/dq/rows?limit=1', timeout=10).status==200 else 1)"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  autoheal:
    image: willfarrell/autoheal:1.2.0          # unhealthy 컨테이너 자동 재시작 (멀티아치, arm64 OK)
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal      # label=autoheal=true 인 컨테이너만 감시
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # 컨테이너 상태 조회/재시작용 (read-only)
    restart: always

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
